<header class="nav">
  <a href="#top" class="brand" data-bind="name">YOUR NAME</a>
  <nav>
    <a href="#gallery" data-bind="labels.navPortfolio">Portfolio</a>
    <a href="#stats" data-bind="labels.navStats">Stats</a>
    <a href="#contact" data-bind="labels.navContact">Contact</a>
  </nav>
</header>

<main id="top">

  <section class="hero">
    <img class="hero-img" data-bind-src="hero.image" data-bind-alt="hero.alt" src="" alt="" loading="eager" />
    <div class="hero-text">
      <h1 data-bind="name">YOUR NAME</h1>
      <p class="tagline" data-bind="tagline">Tagline goes here</p>
    </div>
  </section>

  <section id="stats" class="stats">
    <h2 data-bind="labels.statsTitle">Stats</h2>
    <dl class="stats-grid" data-bind-stats></dl>
  </section>

  <section id="gallery" class="gallery">
    <h2 data-bind="labels.galleryTitle">Portfolio</h2>
    <div class="gallery-grid" data-bind-gallery></div>
  </section>

  <section id="contact" class="contact">
    <h2 data-bind="labels.contactTitle">Contact</h2>
    <p data-bind="labels.contactSubtitle">For bookings, inquiries, and collaborations.</p>
    <ul class="contact-list">
      <li><span data-bind="labels.emailLabel">Email</span> <a data-bind-href="contact.email" data-bind="contact.email" data-href-prefix="mailto:"></a></li>
      <li><span data-bind="labels.instagramLabel">Instagram</span> <a data-bind-href="contact.instagramUrl" data-bind="contact.instagram" target="_blank" rel="noopener"></a></li>
      <li><span data-bind="labels.agencyLabel">Representation</span> <span data-bind="contact.agency"></span></li>
    </ul>
  </section>

</main>

<footer>
  <p>&copy; <span id="year"></span> <span data-bind="name"></span></p>
</footer>

<div class="lightbox" id="lightbox" aria-hidden="true" role="dialog">
  <button class="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-prev" aria-label="Previous">&#10094;</button>
  <img class="lightbox-img" alt="" />
  <button class="lightbox-next" aria-label="Next">&#10095;</button>
</div>

<script src="script.js"></script>
